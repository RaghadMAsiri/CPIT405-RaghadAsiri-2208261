<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <nav>
            <a href="index.html">Home</a>
            <a href="schedule.html">Class Schedule</a>
            <a href="labs.html">Labs & Activities</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <div class="main-container">
        <aside class="left-nav">
            <img src="images/profile.jpg" alt="Profile" class="profile-pic">
            <h2>Raghad</h2>
        </aside>

        <main class="content">
            <h2>Contact Me</h2>
            <form action="https://webhook.site/YOUR-UNIQUE-LINK-HERE" method="POST">
                <div class="form-group">
                    <label for="name">Name (Required):</label> <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email (Optional):</label> <input type="email" id="email" name="email">
                </div>

                <div class="form-group">
                    <label>Message Type:</label>
                    <div style="margin-top: 10px;">
                        <input type="radio" id="inquiry" name="type" value="Inquiry" checked>
                        <label for="inquiry" class="radio-label">Inquiry</label>

                        <input type="radio" id="complaint" name="type" value="Complaint">
                        <label for="complaint" class="radio-label">Complaint</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="10" required></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit</button>
            </form>
        </main>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Raghad. All Rights Reserved.</p>
    </footer>

</body>

</html>

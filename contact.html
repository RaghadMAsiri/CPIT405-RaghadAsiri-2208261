    <div class="main-container">

            <div class="contact-links">

        <main class="content">
            <section>
                <h2>Contact Me</h2>
                
                <form action="https://webhook.site/981c7e2c-8ef5-45a4-916b-9f649e2392b3" method="POST">
                    
                    <div class="form-group">
                        <label for="name">Name (Required):</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email (Optional):</label>
                        <input type="email" id="email" name="email">
                    </div>

                    <div class="form-group">
                        <label>Message Type:</label>
                        <div style="margin-top: 10px;">
                            <input type="radio" id="inquiry" name="type" value="Inquiry" checked>
                            <label for="inquiry" class="radio-label">Inquiry</label>
                            
                            <input type="radio" id="complaint" name="type" value="Complaint">
                            <label for="complaint" class="radio-label">Complaint</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" rows="10" required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Submit</button>
                </form>
            </section>
        </main>
    </div>
